<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Flow AI</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

  <canvas id="orb-canvas"></canvas>

  <div class="overlay">

    <h1>FLOW</h1>

    <p id="status">
      Awaiting command...
    </p>

    <div class="input-area">

      <button onclick="startListening()">
        🎤
      </button>

      <input type="text"
      id="user-input"
      placeholder="Talk to Flow...">

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
